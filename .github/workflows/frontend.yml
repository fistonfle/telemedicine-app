# Frontend-only repo: install, test, build (use this if repo root IS the frontend)
name: Frontend

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Install dependencies (no lockfile)
        if: failure()
        run: npm install

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
